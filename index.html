<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Pokémon</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🔎 Buscador de Pokémon</h1>

        <p class="descripcion">
            Escribe el nombre de un Pokémon y descubre su información.
        </p>

        <div class="busqueda">

            <input
                type="text"
                id="pokemon"
                placeholder="Ejemplo: pikachu">

            <button id="buscar">
                Buscar
            </button>

        </div>

        <div id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
